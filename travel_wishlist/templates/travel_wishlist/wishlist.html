{% extends 'travel_wishlist/base.html' %}
{% block content %}

<h2>Travel Wishlist</h2>

<form class="add-place-form" method="POST" action="{% url 'place_list' %}">
    {% csrf_token %}

    <label for="{{ place_form.name.id_for_label }}">Name:</label>
    {{ place_form.name }}

    <label for="{{ place_form.visited.id_for_label }}">Visited:</label>
    {{ place_form.visited }}

    <button id="add-new-place" type="submit">Add</button>
</form>

{% for place in places %}

<div class="wishlist-place">
    <span class="place_name">{{ place.name }}</span>

    <form class ="visited-form" method="POST" action="{% url 'place_visited' place.pk %}">
        {% csrf_token %}
        <button>Visited!</button>
    </form>

</div>

{% empty %}

<p>You have no places in your wishlist.</p>

{% endfor %}

{% endblock %}
